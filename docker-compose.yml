version: '3.8'

services:
  fuseki:
    image: stain/jena-fuseki:4.10.0
    container_name: agrisem-fuseki
    ports:
      - "3030:3030"
    environment:
      - ADMIN_PASSWORD=admin
      - JVM_ARGS=-Xmx2g
    volumes:
      - fuseki_data:/fuseki
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/$/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  fuseki_data:
