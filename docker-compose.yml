version: '3.8'

services:
  fuseki:
    image: stain/jena-fuseki:4.8.0
    container_name: agrisem-fuseki
    ports:
      - "3030:3030"
    environment:
      - ADMIN_PASSWORD=admin
      - JVM_ARGS=-Xmx2g
    volumes:
      - fuseki_data:/fuseki
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/$/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: agrisem-pipeline
    ports:
      - "5000:5000"
    environment:
      - FUSEKI_URL=http://fuseki:3030
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./results:/app/results
      - ./config:/app/config
    depends_on:
      fuseki:
        condition: service_healthy
    restart: unless-stopped
    command: ["python", "server.py"]

volumes:
  fuseki_data: